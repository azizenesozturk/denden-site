<script>
  const menuAcBtn = document.getElementById('menuAcBtn');
  const menuKapatBtn = document.getElementById('menuKapatBtn');
  const mobilMenu = document.getElementById('mobilMenu');

  menuAcBtn.addEventListener('click', () => {
    mobilMenu.classList.remove('hidden');
    mobilMenu.classList.add('flex');
  });

  menuKapatBtn.addEventListener('click', () => {
    mobilMenu.classList.add('hidden');
    mobilMenu.classList.remove('flex');
  });

// OYUN — TEMEL İSKELET
  const canvas = document.getElementById('oyunCanvas');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const zeminY = 400; // zeminin y konumu
  const karakterResmi = new Image();
karakterResmi.src = 'images/karakter.png';

const agacResmi = new Image();
agacResmi.src = 'images/agac.png';

const kalkanResmi = new Image();
kalkanResmi.src = 'images/kalkan.png';

const kanatResmi = new Image();
kanatResmi.src = 'images/kanat.png';


  const karakter = {
    x: 80,
    y: zeminY - 34,
    w: 34,
    h: 34,
    renk: '#F3701E',
    ySpeed: 0,
    ziplamada: false
  };

  // AĞAÇLAR (ENGELLER)
  let agaclar = [];
  let sonrakiAgacSayaci = 100; // oyun başladıktan sonra biraz bekle

  function agacOlustur() {
    agaclar.push({
      x: canvas.width,
      y: zeminY - 28,
      w: 28,
      h: 28
    });
  }

  function agaclariGuncelle() {
    // Yeni ağaç oluştur (rastgele aralıklarla)
    sonrakiAgacSayaci--;
    if (sonrakiAgacSayaci <= 0) {
      agacOlustur();
      sonrakiAgacSayaci = 80 + Math.random() * 80; // 80-160 frame arası bekle
    }

    // Ağaçları hareket ettir
    agaclar.forEach(a => a.x -= hiz);

    // Ekrandan çıkanları sil
    agaclar = agaclar.filter(a => a.x + a.w > 0);
  }

  function cizAgaclar() {
    agaclar.forEach(a => {
      ctx.drawImage(agacResmi, a.x, a.y, a.w, a.h);
    });
  }

  // POWER-UP'LAR
  let powerUplar = [];
  let sonrakiPowerUpSayaci = 300;

  let kalkanAktif = false;
  let ucmaAktif = false;
  let ucmaSuresi = 0;

  function powerUpOlustur() {
    const tip = Math.random() < 0.5 ? 'kalkan' : 'ucma';
    powerUplar.push({
      x: canvas.width,
      y: zeminY - 80 - Math.random() * 40,
      w: 22,
      h: 22,
      tip: tip
    });
  }

  function powerUplariGuncelle() {
    sonrakiPowerUpSayaci--;
    if (sonrakiPowerUpSayaci <= 0) {
      powerUpOlustur();
      sonrakiPowerUpSayaci = 250 + Math.random() * 200;
    }

    powerUplar.forEach(p => p.x -= hiz);
    powerUplar = powerUplar.filter(p => p.x + p.w > 0);

    // Karakterle çarpışma (toplama)
    powerUplar = powerUplar.filter(p => {
      const carpisti = karakter.x < p.x + p.w &&
                        karakter.x + karakter.w > p.x &&
                        karakter.y < p.y + p.h &&
                        karakter.y + karakter.h > p.y;
      if (carpisti) {
        if (p.tip === 'kalkan') {
          kalkanAktif = true;
        } else {
          ucmaAktif = true;
          ucmaSuresi = 200; // frame sayısı, yaklaşık 3-4 saniye
        }
        return false; // toplandı, listeden çıkar
      }
      return true;
    });
  }

  function cizPowerUplar() {
    powerUplar.forEach(p => {
      const resim = p.tip === 'kalkan' ? kalkanResmi : kanatResmi;
      ctx.drawImage(resim, p.x, p.y, p.w, p.h);
    });
  }

  function cizPowerUpDurumu() {
    ctx.textAlign = 'left';
    ctx.font = 'bold 13px sans-serif';
    let y = 25;
    if (kalkanAktif) {
      ctx.fillStyle = '#7BA7AF';
      ctx.fillText('🛡 Kalkan Aktif', 15, y);
      y += 20;
    }
    if (ucmaAktif) {
      ctx.fillStyle = '#B2E50F';
      ctx.fillText('🪶 Uçuyorsun', 15, y);
    }
  }

  function cizSkor() {
    ctx.fillStyle = '#C1AB85';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('Skor: ' + Math.floor(skor), canvas.width - 15, 25);
    ctx.fillText('En Yüksek: ' + enYuksekSkor, canvas.width - 15, 45);
  }

  function carpismaKontrol() {
    if (ucmaAktif) return false; // uçarken hiçbir şeye çarpmaz

    for (let i = 0; i < agaclar.length; i++) {
      const a = agaclar[i];
      if (
        karakter.x < a.x + a.w &&
        karakter.x + karakter.w > a.x &&
        karakter.y < a.y + a.h &&
        karakter.y + karakter.h > a.y
      ) {
        if (kalkanAktif) {
          kalkanAktif = false; // kalkan bir kere korur, sonra biter
          agaclar.splice(i, 1); // çarpılan ağacı kaldır, tekrar çarpmasın
          return false;
        }
        return true;
      }
    }
    return false;
  }

  const yerCekimi = 0.60;
const ziplamaGucu = -13;
  const zeminSeviyesi = zeminY - 34; // karakterin yerde durduğu y konumu

  // SKOR
  let skor = 0;
  let enYuksekSkor = parseInt(localStorage.getItem('enYuksekSkor')) || 0;

  function cizZemin() {
    ctx.strokeStyle = '#C1AB85';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, zeminY);
    ctx.lineTo(canvas.width, zeminY);
    ctx.stroke();
  }

  function cizKarakter() {
    ctx.save();
    ctx.globalAlpha = 1;
    if (karakterResmi.complete && karakterResmi.naturalWidth > 0) {
      ctx.drawImage(karakterResmi, karakter.x, karakter.y, karakter.w, karakter.h);
    } else {
      // Resim yüklenmemişse görünmez kalmasın diye yedek çizim
      ctx.fillStyle = karakter.renk;
      ctx.fillRect(karakter.x, karakter.y, karakter.w, karakter.h);
    }
    ctx.restore();

    if (ucmaAktif) {
      ctx.strokeStyle = '#B2E50F';
      ctx.lineWidth = 3;
      ctx.strokeRect(karakter.x - 3, karakter.y - 3, karakter.w + 6, karakter.h + 6);
    } else if (kalkanAktif) {
      ctx.strokeStyle = '#7BA7AF';
      ctx.lineWidth = 3;
      ctx.strokeRect(karakter.x - 3, karakter.y - 3, karakter.w + 6, karakter.h + 6);
    }
  }

  let zeminOffset = 0;
let hiz = 5.5;
let oyunBasladi = false;

  function cizZeminCizgileri() {
    ctx.strokeStyle = 'rgba(193, 171, 133, 0.3)';
    ctx.lineWidth = 2;
    for (let i = 0; i < canvas.width / 40 + 2; i++) {
      const x = (i * 40 - zeminOffset % 40);
      ctx.beginPath();
      ctx.moveTo(x, zeminY + 10);
      ctx.lineTo(x + 20, zeminY + 10);
      ctx.stroke();
    }
  }

  function karakterFizik() {
    if (ucmaAktif) {
      // Uçarken havada süzülür, hafifçe yukarı-aşağı gider
      karakter.y = zeminSeviyesi - 60 + Math.sin(zeminOffset * 0.1) * 10;
      karakter.ySpeed = 0;

      ucmaSuresi--;
      if (ucmaSuresi <= 0) {
        ucmaAktif = false;
      }
    } else {
      karakter.ySpeed += yerCekimi;
      karakter.y += karakter.ySpeed;

      if (karakter.y >= zeminSeviyesi) {
        karakter.y = zeminSeviyesi;
        karakter.ySpeed = 0;
        karakter.ziplamada = false;
      }
    }
  }

  function ziplat() {
    if (!karakter.ziplamada) {
      karakter.ySpeed = ziplamaGucu;
      karakter.ziplamada = true;
    }
  }

  let oyunBitti = false;

  function cizBaslangicEkrani() {
    ctx.fillStyle = '#7BA7AF';
    ctx.font = 'bold 22px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Zirveye Koş', canvas.width / 2, 110);

    ctx.font = '14px sans-serif';
    ctx.fillStyle = '#C1AB85';
    ctx.fillText('Başlamak için tıkla veya BOŞLUK\'a bas', canvas.width / 2, 140);
  }

  function oyunuBaslat() {
    if (oyunBasladi) return;
    oyunBasladi = true;
    document.getElementById('baslaIkon').classList.add('hidden');
  }

  function oyunDongu() {
    if (oyunBitti) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!oyunBasladi) {
      cizBaslangicEkrani();
      requestAnimationFrame(oyunDongu);
      return;
    }
    
    cizZemin();
    cizZeminCizgileri();
    karakterFizik();
    agaclariGuncelle();
    powerUplariGuncelle();
    cizAgaclar();
    cizPowerUplar();
    cizKarakter();
    cizSkor();
    cizPowerUpDurumu();

    skor += 0.15; // her frame'de biraz skor ekle (mesafe bazlı)

    if (carpismaKontrol()) {
      oyunBitti = true;

      if (Math.floor(skor) > enYuksekSkor) {
        enYuksekSkor = Math.floor(skor);
        localStorage.setItem('enYuksekSkor', enYuksekSkor);
      }

      ctx.fillStyle = 'rgba(26, 38, 38, 0.8)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#F3701E';
      ctx.font = 'bold 24px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Oyun Bitti', canvas.width / 2, canvas.height / 2 - 15);
      ctx.font = '16px sans-serif';
      ctx.fillStyle = '#C1AB85';
      ctx.fillText('Skor: ' + Math.floor(skor) + '  —  Yeniden başlamak için tıkla', canvas.width / 2, canvas.height / 2 + 15);
      return;
    }

    zeminOffset += hiz;

    if (hiz < 13) {
      hiz += 0.006;
    }

    requestAnimationFrame(oyunDongu);
  }

  

  oyunDongu();
  document.getElementById('baslaIkon').addEventListener('click', () => {
    oyunuBaslat();
  });
  // KLAVYE VE DOKUNMA KONTROLÜ
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      if (!oyunBasladi) {
        oyunuBaslat();
      } else if (!oyunBitti) {
        ziplat();
      }
    }
  });

  canvas.addEventListener('click', () => {
    if (oyunBitti) {
      window.location.reload();
    } else if (!oyunBasladi) {
      oyunuBaslat();
    } else {
      ziplat();
    }
  });

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (oyunBitti) {
      window.location.reload();
    } else if (!oyunBasladi) {
      oyunuBaslat();
    } else {
      ziplat();
    }
  });

  

</script>
