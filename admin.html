<main>
  <section class="max-w-4xl mx-auto px-6 py-12">
    <h1 class="text-heading text-3xl font-bold mb-6">İçerik Yönetimi</h1>

    <div class="flex gap-3 mb-8 flex-wrap">
      <button class="tabBtn bg-accent text-white px-4 py-2 rounded-lg font-semibold" data-tab="faaliyet">Faaliyet</button>
      <button class="tabBtn bg-card text-text px-4 py-2 rounded-lg font-semibold" data-tab="blog">Blog</button>
      <button class="tabBtn bg-card text-text px-4 py-2 rounded-lg font-semibold" data-tab="duyuru">Duyuru</button>
      <button class="tabBtn bg-card text-text px-4 py-2 rounded-lg font-semibold" data-tab="calisma">Çalışmalarım</button>
    </div>

    <!-- FAALİYET FORMU -->
    <div id="tab-faaliyet" class="space-y-3">
      <input id="f_id" placeholder="ID (örn: yilan-kalesi-2026, boşluksuz-küçük harf-tire ile)" class="w-full bg-card text-text rounded-lg px-4 py-3">
      <input id="f_tarih" type="date" class="w-full bg-card text-text rounded-lg px-4 py-3">
      <input id="f_rota" placeholder="Rota / Zirve Adı" class="w-full bg-card text-text rounded-lg px-4 py-3">
      <input id="f_bolge" placeholder="Bölge (örn: Adana/Ceyhan)" class="w-full bg-card text-text rounded-lg px-4 py-3">
      <select id="f_zorluk" class="w-full bg-card text-text rounded-lg px-4 py-3">
        <option value="Kolay">Kolay</option>
        <option value="Orta" selected>Orta</option>
        <option value="Zor">Zor</option>
      </select>
      <input id="f_ekip" placeholder="Ekip (virgülle ayır: Ben, Arkadaşım)" class="w-full bg-card text-text rounded-lg px-4 py-3">
      <input id="f_hava" placeholder="Hava Durumu" class="w-full bg-card text-text rounded-lg px-4 py-3">
      <input id="f_ekipman" placeholder="Ekipman (virgülle ayır: Kask, İp)" class="w-full bg-card text-text rounded-lg px-4 py-3">
      <input id="f_klasor" placeholder="Fotoğraf klasörü adı (örn: yilan-kalesi-2026)" class="w-full bg-card text-text rounded-lg px-4 py-3">
      <input id="f_fotosayisi" type="number" placeholder="Kaç foto var (foto1, foto2... otomatik adlandırılır)" value="3" class="w-full bg-card text-text rounded-lg px-4 py-3">
      <textarea id="f_detaylar" placeholder="Detaylar (nasıl gidilir, süre vb.)" rows="2" class="w-full bg-card text-text rounded-lg px-4 py-3"></textarea>
      <textarea id="f_ani" placeholder="Anılarım" rows="4" class="w-full bg-card text-text rounded-lg px-4 py-3"></textarea>
      <input id="f_sonbasvuru" type="date" placeholder="Son başvuru tarihi (opsiyonel)" class="w-full bg-card text-text rounded-lg px-4 py-3">
      <button onclick="faaliyetOlustur()" class="bg-highlight text-bg font-bold px-6 py-3 rounded-lg w-full">Faaliyeti Oluştur ve İndir</button>
    </div>

    <!-- BLOG FORMU -->
    <div id="tab-blog" class="space-y-3 hidden">
      <input id="b_id" placeholder="ID (örn: kariyerim-3-yil)" class="w-full bg-card text-text rounded-lg px-4 py-3">
      <input id="b_tarih" type="date" class="w-full bg-card text-text rounded-lg px-4 py-3">
      <input id="b_kategori" placeholder="Kategori (örn: Yazılım, Düşünceler)" class="w-full bg-card text-text rounded-lg px-4 py-3">
      <input id="b_baslik" placeholder="Başlık" class="w-full bg-card text-text rounded-lg px-4 py-3">
      <input id="b_ozet" placeholder="Kısa özet" class="w-full bg-card text-text rounded-lg px-4 py-3">
      <input id="b_kapak" placeholder="Kapak görsel yolu (örn: images/blog/kapak.jpg)" class="w-full bg-card text-text rounded-lg px-4 py-3">
      <textarea id="b_icerik" placeholder="İçerik (Markdown desteklenir: ![açıklama](resim-yolu))" rows="6" class="w-full bg-card text-text rounded-lg px-4 py-3"></textarea>
      <button onclick="blogOlustur()" class="bg-highlight text-bg font-bold px-6 py-3 rounded-lg w-full">Blog Yazısını Oluştur ve İndir</button>
    </div>

    <!-- DUYURU FORMU -->
    <div id="tab-duyuru" class="space-y-3 hidden">
      <input id="d_tarih" type="date" class="w-full bg-card text-text rounded-lg px-4 py-3">
      <input id="d_baslik" placeholder="Duyuru Başlığı" class="w-full bg-card text-text rounded-lg px-4 py-3">
      <textarea id="d_metin" placeholder="Duyuru Metni" rows="3" class="w-full bg-card text-text rounded-lg px-4 py-3"></textarea>
      <button onclick="duyuruOlustur()" class="bg-highlight text-bg font-bold px-6 py-3 rounded-lg w-full">Duyuruyu Oluştur ve İndir</button>
    </div>

    <!-- ÇALIŞMALARIM FORMU -->
    <div id="tab-calisma" class="space-y-3 hidden">
      <input id="c_ad" placeholder="Proje Adı" class="w-full bg-card text-text rounded-lg px-4 py-3">
      <input id="c_kisaaciklama" placeholder="Kısa Açıklama (1 cümle)" class="w-full bg-card text-text rounded-lg px-4 py-3">
      <textarea id="c_aciklama" placeholder="Detaylı Açıklama" rows="3" class="w-full bg-card text-text rounded-lg px-4 py-3"></textarea>
      <input id="c_link" placeholder="Proje Linki (https://...)" class="w-full bg-card text-text rounded-lg px-4 py-3">
      <button onclick="calismaOlustur()" class="bg-highlight text-bg font-bold px-6 py-3 rounded-lg w-full">Projeyi Oluştur ve İndir</button>
    </div>

    <p id="adminMesaj" class="text-highlight font-semibold mt-4"></p>
  </section>
</main>

<script>

  
  const menuAcBtn = document.getElementById('menuAcBtn');
  const menuKapatBtn = document.getElementById('menuKapatBtn');
  const mobilMenu = document.getElementById('mobilMenu');

  menuAcBtn.addEventListener('click', () => {
    mobilMenu.classList.remove('hidden');
    mobilMenu.classList.add('flex');
  });

  menuKapatBtn.addEventListener('click', () => {
    mobilMenu.classList.add('hidden');
    mobilMenu.classList.remove('flex');
  });

  document.querySelectorAll('.tabBtn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tabBtn').forEach(b => { b.classList.remove('bg-accent','text-white'); b.classList.add('bg-card','text-text'); });
      btn.classList.remove('bg-card','text-text'); btn.classList.add('bg-accent','text-white');
      ['faaliyet','blog','duyuru','calisma'].forEach(t => document.getElementById('tab-'+t).classList.add('hidden'));
      document.getElementById('tab-'+btn.dataset.tab).classList.remove('hidden');
    });
  });

  function indir(dosyaAdi, veri) {
    const blob = new Blob([JSON.stringify(veri, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = dosyaAdi;
    a.click();
    URL.revokeObjectURL(url);
    document.getElementById('adminMesaj').textContent = `${dosyaAdi} indirildi. data/ klasörüne sürükleyip üzerine yaz.`;
  }

  function faaliyetOlustur() {
    const klasor = document.getElementById('f_klasor').value.trim();
    const fotoSayisi = parseInt(document.getElementById('f_fotosayisi').value) || 0;
    const fotograflar = [];
    for (let i = 1; i <= fotoSayisi; i++) {
      fotograflar.push({ url: `images/faaliyetler/${klasor}/foto${i}.jpeg`, aciklama: "" });
    }

    const yeniKayit = {
      id: document.getElementById('f_id').value.trim(),
      tarih: document.getElementById('f_tarih').value,
      rota: document.getElementById('f_rota').value,
      bolge: document.getElementById('f_bolge').value,
      zorluk: document.getElementById('f_zorluk').value,
      ekip: document.getElementById('f_ekip').value.split(',').map(s => s.trim()).filter(Boolean),
      havaDurumu: document.getElementById('f_hava').value,
      ekipman: document.getElementById('f_ekipman').value.split(',').map(s => s.trim()).filter(Boolean),
      kapak: `images/faaliyetler/${klasor}/kapak.jpeg`,
      detaylar: document.getElementById('f_detaylar').value,
      ani: document.getElementById('f_ani').value,
      sonBasvuruTarihi: document.getElementById('f_sonbasvuru').value || "",
      fotograflar: fotograflar
    };

    fetch('data/faaliyetler.json').then(r => r.json()).then(mevcut => {
      mevcut.unshift(yeniKayit);
      indir('faaliyetler.json', mevcut);
    }).catch(() => indir('faaliyetler.json', [yeniKayit]));
  }

  function blogOlustur() {
    const yeniKayit = {
      id: document.getElementById('b_id').value.trim(),
      tarih: document.getElementById('b_tarih').value,
      kategori: document.getElementById('b_kategori').value,
      baslik: document.getElementById('b_baslik').value,
      ozet: document.getElementById('b_ozet').value,
      kapak: document.getElementById('b_kapak').value,
      icerik: document.getElementById('b_icerik').value
    };

    fetch('data/blog.json').then(r => r.json()).then(mevcut => {
      mevcut.unshift(yeniKayit);
      indir('blog.json', mevcut);
    }).catch(() => indir('blog.json', [yeniKayit]));
  }

  function duyuruOlustur() {
    const yeniKayit = {
      tarih: document.getElementById('d_tarih').value,
      baslik: document.getElementById('d_baslik').value,
      metin: document.getElementById('d_metin').value
    };

    fetch('data/duyuru.json').then(r => r.json()).then(mevcut => {
      mevcut.unshift(yeniKayit);
      indir('duyuru.json', mevcut);
    }).catch(() => indir('duyuru.json', [yeniKayit]));
  }
  function calismaOlustur() {
    const yeniKayit = {
      ad: document.getElementById('c_ad').value,
      kisaAciklama: document.getElementById('c_kisaaciklama').value,
      aciklama: document.getElementById('c_aciklama').value,
      link: document.getElementById('c_link').value
    };

    fetch('data/calismalarim.json').then(r => r.json()).then(mevcut => {
      mevcut.unshift(yeniKayit);
      indir('calismalarim.json', mevcut);
    }).catch(() => indir('calismalarim.json', [yeniKayit]));
  }
</script>
