<script>
  const menuAcBtn = document.getElementById('menuAcBtn');
  const menuKapatBtn = document.getElementById('menuKapatBtn');
  const mobilMenu = document.getElementById('mobilMenu');

  menuAcBtn.addEventListener('click', () => {
    mobilMenu.classList.remove('hidden');
    mobilMenu.classList.add('flex');
  });

  menuKapatBtn.addEventListener('click', () => {
    mobilMenu.classList.add('hidden');
    mobilMenu.classList.remove('flex');
  });

// URL'DEN BLOG ID'SİNİ AL
  const blogUrlParams = new URLSearchParams(window.location.search);
  const blogId = blogUrlParams.get('id');

  fetch('data/blog.json')
    .then(response => response.json())
    .then(yazilar => {
      const b = yazilar.find(item => item.id === blogId);
      const container = document.getElementById('blogIcerik');

      if (!b) {
        container.innerHTML = '<p class="text-text">Yazı bulunamadı.</p>';
        return;
      }

      // Markdown içeriği HTML'e çevir
      const icerikHTML = marked.parse(b.icerik);

      container.innerHTML = `
        <div class="h-72 bg-bg/50 rounded-xl mb-6 overflow-hidden">
          <img src="${b.kapak}" class="w-full h-full object-cover" onerror="this.style.display='none'">
        </div>

        <span class="text-heading text-xs font-semibold">${b.kategori}</span>
        <h1 class="text-heading text-3xl font-bold mt-2 mb-2">${b.baslik}</h1>
        <p class="text-text/60 text-sm mb-8">${b.tarih}</p>

        <div class="prose-blog text-text leading-relaxed">
          ${icerikHTML}
        </div>
      `;
    })
    .catch(err => console.error('Yazı yüklenemedi:', err));

</script>
