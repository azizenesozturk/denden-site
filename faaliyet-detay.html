<main>

    <div id="faaliyetIcerik">
      <!-- İçerik JS ile doldurulacak -->
      <p class="text-text">Yükleniyor...</p>
    </div>
  </section>

<script>
  const menuAcBtn = document.getElementById('menuAcBtn');
  const menuKapatBtn = document.getElementById('menuKapatBtn');
  const mobilMenu = document.getElementById('mobilMenu');

  menuAcBtn.addEventListener('click', () => {
    mobilMenu.classList.remove('hidden');
    mobilMenu.classList.add('flex');
  });

  menuKapatBtn.addEventListener('click', () => {
    mobilMenu.classList.add('hidden');
    mobilMenu.classList.remove('flex');
  });


  // URL'DEN FAALİYET ID'SİNİ AL
  const urlParams = new URLSearchParams(window.location.search);
  const faaliyetId = urlParams.get('id');

  fetch('data/faaliyetler.json')
    .then(response => response.json())
    .then(faaliyetler => {
      const f = faaliyetler.find(item => item.id === faaliyetId);
      const container = document.getElementById('faaliyetIcerik');

      if (!f) {
        container.innerHTML = '<p class="text-text">Faaliyet bulunamadı.</p>';
        return;
      }

      const zorlukRenk = f.zorluk === 'Kolay' ? 'bg-highlight text-bg' 
                        : f.zorluk === 'Zor' ? 'bg-danger text-white' 
                        : 'bg-accent text-white';

      const alevIkon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" class="inline -mt-0.5 mr-1"><path d="M12 2c1 3-2 4-2 7a3 3 0 0 0 6 0c0-2-1-3-1-3 2 1 3 4 3 6a6 6 0 0 1-12 0c0-4 3-6 3-10 1 1 2 2 3 0Z"/></svg>`;

      // Fotoğraf galerisi — DÜŞEY (alt alta), açıklama alanı ile
      const galeriHTML = (f.fotograflar || []).map(foto => {
        const url = typeof foto === 'string' ? foto : foto.url;
        const aciklama = typeof foto === 'string' ? '' : (foto.aciklama || '');
        return `
          <div class="mb-6">
            <img src="${url}" class="w-full rounded-xl" onerror="this.style.display='none'">
            ${aciklama ? `<p class="text-text/70 text-sm mt-2 italic">${aciklama}</p>` : ''}
          </div>
        `;
      }).join('');

      // "İlgileniyorum" butonu — sadece son başvuru tarihi geçmemişse görünür
      const bugun = new Date();
      const sonTarih = f.sonBasvuruTarihi ? new Date(f.sonBasvuruTarihi) : null;
      const butonGoster = sonTarih && bugun <= sonTarih;

      const butonHTML = butonGoster ? `
        <a href="iletisim.html?konu=${encodeURIComponent(f.rota)}" class="inline-block bg-accent text-white font-semibold px-6 py-3 rounded-lg hover:opacity-90 transition">
          İlgileniyorum →
        </a>
      ` : '';

      

      container.innerHTML = `
        <div class="h-72 bg-bg/50 rounded-xl mb-4 overflow-hidden">
          <img src="${f.kapak}" class="w-full h-full object-cover" style="object-position: center 40%;" onerror="this.style.display='none'">
        </div>

        ${f.detaylar ? `
          <div class="bg-card rounded-xl p-5 mb-6 border-l-4 border-accent">
            <h3 class="text-heading text-lg font-bold mb-2">Detaylar</h3>
            <p class="text-highlight leading-relaxed">${f.detaylar}</p>
          </div>
        ` : ''}

        <span class="${zorlukRenk} text-xs font-semibold px-3 py-1 rounded-full">${alevIkon}Zorluk: ${f.zorluk}</span>
        <h1 class="text-heading text-3xl font-bold mt-3 mb-4">${f.rota}</h1>

        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-8 text-sm">
          <div><span class="text-heading font-semibold">Tarih:</span> <span class="text-text">${f.tarih}</span></div>
          <div><span class="text-heading font-semibold">Bölge:</span> <span class="text-text">${f.bolge}</span></div>
          <div><span class="text-heading font-semibold">Hava:</span> <span class="text-text">${f.havaDurumu}</span></div>
          <div><span class="text-heading font-semibold">Ekip:</span> <span class="text-text">${f.ekip.join(', ')}</span></div>
          <div><span class="text-heading font-semibold">Ekipman:</span> <span class="text-text">${f.ekipman.join(', ')}</span></div>
        </div>

        <h3 class="text-heading text-lg font-bold mb-2">Anılarım</h3>
        <p class="text-text leading-relaxed mb-8">${f.ani}</p>

        <div class="mb-6">
          ${galeriHTML}
        </div>

        ${butonHTML}
      `;
    })
    .catch(err => console.error('Faaliyet yüklenemedi:', err));

</script>
