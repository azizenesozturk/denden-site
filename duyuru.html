<script>
  const menuAcBtn = document.getElementById('menuAcBtn');
  const menuKapatBtn = document.getElementById('menuKapatBtn');
  const mobilMenu = document.getElementById('mobilMenu');

  menuAcBtn.addEventListener('click', () => {
    mobilMenu.classList.remove('hidden');
    mobilMenu.classList.add('flex');
  });

  menuKapatBtn.addEventListener('click', () => {
    mobilMenu.classList.add('hidden');
    mobilMenu.classList.remove('flex');
  });

// DUYURULARI JSON'DAN ÇEK VE GÖSTER
  fetch('data/duyuru.json')
    .then(response => response.json())
    .then(duyurular => {
      // Tarihe göre sırala (en yeni önce)
      duyurular.sort((a, b) => new Date(b.tarih) - new Date(a.tarih));

      const guncel = duyurular[0];
      const eskiler = duyurular.slice(1);

      const container = document.getElementById('duyuruIcerik');

      let html = `
        <div class="bg-card border-2 border-highlight rounded-xl p-6 mb-10">
          <span class="bg-accent text-white text-xs font-semibold px-3 py-1 rounded-full">GÜNCEL</span>
          <h2 class="text-heading text-2xl font-bold mt-4 mb-2">${guncel.baslik}</h2>
          <p class="text-text text-sm mb-2">${guncel.tarih}</p>
          <p class="text-text">${guncel.metin}</p>
        </div>
      `;

      if (eskiler.length > 0) {
        html += `<h3 class="text-heading text-lg font-bold mb-4">Eski Duyurular</h3>`;
        html += `<div class="space-y-4">`;
        eskiler.forEach(d => {
          html += `
            <div class="bg-card/50 rounded-lg p-4">
              <p class="text-text text-xs mb-1">${d.tarih}</p>
              <h4 class="text-heading font-semibold">${d.baslik}</h4>
              <p class="text-text text-sm mt-1">${d.metin}</p>
            </div>
          `;
        });
        html += `</div>`;
      }

      container.innerHTML = html;
    })
    .catch(err => console.error('Duyurular yüklenemedi:', err));

</script>
